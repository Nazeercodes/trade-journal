services:
  - type: web
    name: trade-journal-api
    env: python
    plan: free
    buildCommand: "cd server && pip install -r requirements.txt"
    startCommand: "cd server && uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: DATABASE_URL
        sync: false
      - key: GEMINI_API_KEY
        sync: false
